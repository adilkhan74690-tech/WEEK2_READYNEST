<!doctype html>
<html lang="en" class="light">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          var fetchValue = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return fetchValue;
            },
            set: function(val) {
              fetchValue = val;
            },
            configurable: true,
            enumerable: true
          });
          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            Object.defineProperty(globalThis, 'fetch', {
              get: function() {
                return fetchValue;
              },
              set: function(val) {
                fetchValue = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to define configurable fetch:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Control Center | EduCore ERP</title>

  </head>

  </body>
</html>
